# Autogram v2 config -- Abilene CrossCheck observed sample.
dataset: abilene
data_path: data/crosscheck-samples/abilene_sample_1000.pkl
seed: 0

schema:
  backend: subagent   # allowed: subagent, openai

eval:
  tolerance: 0.05
  separation_tolerance: 0.000001
  hold_rate_threshold: 0.62
  ci_alpha: 0.05

search:
  proposer: enumeration
  max_complexity: 10
  max_add_arity: 2
